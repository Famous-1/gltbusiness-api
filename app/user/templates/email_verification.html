<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Work+Sans&display=swap');

    .body {
      font-family: 'Work Sans', sans-serif;
    }
    .container {
        background: #fff;
    max-width: 30em;
    margin: 0 auto;
    border-radius: 10px;
    border-bottom: 1.5em solid #0AAA59;
    display: flex;
    padding: 2em 0;
    flex-direction: column;
    box-shadow: 0px 0px 8px -8px;
}
.logo {
    width: 10em;
    height: 100%;
    margin: 0 auto;
}

.content {
    display: flex;
    flex-direction: column;
    margin: 2em 2em 0;
}

.intro-label {
    letter-spacing: 6.5px;
}

.username {
    margin: .8em 0 0;
}

.greetings {
    line-height: 1.5;
}

.code {
    color: #0AAA59;
    font-weight: medium;
  text-decoration: none;
    letter-spacing: 1.3px;
}

.regards {
    margin: 1em 0 0;
    line-height: 1.5;
}

.link {
    margin: 1em 0 0;
}

.footer-tab {
    display: flex;
    margin: 1.2em 0 0;
}

    .footer-tab img {
      height: 2em;
      margin-right: 1em;
    }


  </style>
</head>
<body>
  <div class="container">
    <img src="https://res.cloudinary.com/firefly2021/image/upload/v1678135754/logo_xah7im.svg" alt="" class="logo">
    <div class="content">
      <span class="intro-label">DEAR</span>
      <h2 class='username'>{{name}}</h2>
      <p class="greetings">Welcome to GLT BUSINESS SCHOOL! Visit <a class="code" href="https://gltbusiness.netlify.app">GLTBUSINESSSCHOOL</a> and log in to get started. If you have any questions, contact us at info@gltbs.com.</p>
      <p class="regards">Thanks and Regards, <br>
        Team GLT BUSINESS SCHOOL
      </p>
      <span class="link">moolah.com</span>
      <div class="footer-tab">
        <a href=""><img src="https://res.cloudinary.com/marykaystuff/image/upload/v1660814472/media/user_profile/grikcgydpd48hjyrkebs.png" alt="" class="footer-icons"></a>
        <a href=""><img src="https://res.cloudinary.com/marykaystuff/image/upload/v1660814556/media/user_profile/bnbzay57s71dtfa3nx6k.png" alt="" class="footer-icons"></a>
        <a href=""><img src="https://res.cloudinary.com/marykaystuff/image/upload/v1660814490/media/user_profile/ohcadm3gcmpelhl5qaid.png" alt="" class="footer-icons"></a>
        <a href=""><img src="https://res.cloudinary.com/marykaystuff/image/upload/v1660814490/media/user_profile/ftusawk21cfahxyy0ji5.png" alt="" class="footer-icons"></a>
      </div>
    </div>
  </div>
</body>
</html>
